# dbt schema definition for Pharmacy data models
# Contains data quality tests for prescription and medication data

version: 2

models:
  - name: stg_prescriptions
    description: "Staged prescription records from the pharmacy system"
    columns:
      - name: prescription_id
        description: "Unique identifier for each prescription"
        tests:
          - not_null:
              severity: error
          - unique:
              severity: error

      - name: patient_id
        description: "Reference to the patient"
        tests:
          - not_null:
              severity: error
          - relationships:
              to: ref('dim_patients')
              field: patient_id
              severity: error

      - name: prescriber_npi
        description: "NPI of the prescribing physician"
        tests:
          - not_null:
              severity: error
          - dbt_utils.not_empty_string
          - relationships:
              to: ref('dim_providers')
              field: npi
              severity: warn
              config:
                where: "prescriber_npi IS NOT NULL"

      - name: ndc_code
        description: "National Drug Code"
        tests:
          - not_null:
              severity: error
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^[0-9]{5}-[0-9]{4}-[0-9]{2}$"
              severity: warn
              config:
                meta:
                  dimension: validity
                  notes: "NDC codes should follow 5-4-2 format"

      - name: quantity_dispensed
        description: "Number of units dispensed"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0.1
              max_value: 10000
              severity: warn
              config:
                meta:
                  dimension: accuracy
                  notes: "Flag unreasonable quantities"

      - name: days_supply
        description: "Number of days the prescription should last"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 365
              severity: warn

      - name: fill_date
        description: "Date the prescription was filled"
        tests:
          - not_null:
              severity: error
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: "2020-01-01"
              max_value: "{{ modules.datetime.date.today().isoformat() }}"
              severity: error
              config:
                meta:
                  dimension: validity
                  notes: "Fill date must not be in the future"

      - name: drug_class
        description: "Therapeutic drug classification"
        tests:
          - accepted_values:
              values: ['analgesic', 'antibiotic', 'antihypertensive', 'antidiabetic',
                       'statin', 'antidepressant', 'anticoagulant', 'bronchodilator',
                       'immunosuppressant', 'antiviral', 'other']
              severity: warn

  - name: stg_medication_inventory
    description: "Current medication inventory levels"
    columns:
      - name: ndc_code
        tests:
          - not_null
          - unique

      - name: quantity_on_hand
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 999999

      - name: expiration_date
        description: "Medication expiration date"
        tests:
          - not_null:
              severity: error
          - dbt_utils.expression_is_true:
              expression: "> current_date() - INTERVAL 180 DAYS"
              config:
                severity: warn
                meta:
                  dimension: timeliness
                  notes: "Flag medications expired more than 180 days ago"

      - name: lot_number
        tests:
          - not_null
          - dbt_utils.not_empty_string
